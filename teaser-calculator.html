<style>
  body {
    background: #050910;
    margin: 0;
    padding: 20px;
    font-family: 'Segoe UI', sans-serif;
    color: #ffffff;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    background: #0A0F18;
    border: 1px solid #C9A84C;
    border-radius: 12px;
    padding: 30px;
  }

  h1 {
    color: #F7E3A0;
    margin-bottom: 10px;
  }

  label {
    display: block;
    margin-top: 20px;
    font-size: 1.1rem;
  }

  input[type=range] {
    width: 100%;
  }

  .value {
    font-size: 1rem;
    color: #C9A84C;
    margin-top: 4px;
  }

  .cta-btn {
    display: block;
    width: 100%;
    margin-top: 30px;
    padding: 16px;
    background: #1A6B6B;
    border: 1px solid #C9A84C;
    border-radius: 6px;
    color: #F7E3A0;
    text-align: center;
    font-size: 1.2rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    text-decoration: none;
  }
</style>
</head>

<body>

<div class="container">

  <h1>QIB Teaser Calculator</h1>
  <p>Get an instant comparison of your current income vs the QIB Partnership.</p>

  <!-- AUM -->
  <label>AUM (R20m – R750m)</label>
  <input type="range" id="aum" min="20000000" max="750000000" step="1000000" value="50000000">
  <div class="value" id="aumVal">R50,000,000</div>

  <!-- Fee Rate -->
  <label>Fee Rate (0.40% – 1.00%)</label>
  <input type="range" id="fee" min="0.004" max="0.01" step="0.0001" value="0.0064">
  <div class="value" id="feeVal">0.64%</div>

  <!-- CTA -->
  <a id="teaserCTA" href="lite-calculator.html" class="cta-btn">
    View your personalised projection ›
  </a>

</div>

<script>
function formatMoney(x) {
  return "R" + x.toLocaleString();
}

function updateValues() {
  document.getElementById("aumVal").innerText = formatMoney(Number(aum.value));
  document.getElementById("feeVal").innerText = (Number(fee.value) * 100).toFixed(2) + "%";
}

aum.oninput = updateValues;
fee.oninput = updateValues;

// UTM passthrough
(function() {
  const params = new URLSearchParams(window.location.search);
  if ([...params].length > 0) {
    const links = document.querySelectorAll("a");
    links.forEach(a => {
      const url = new URL(a.href, window.location.origin);
      params.forEach((v, k) => url.searchParams.set(k, v));
      a.href = url.toString();
    });
  }
})();

// CTA tracking
document.getElementById("teaserCTA").addEventListener("click", () => {
  gtag('event', 'teaser_cta_click');
  lintrk('track', { conversion_id: 20 });
});
</script>

</body>
</html>
