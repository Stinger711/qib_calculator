<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QIB IFA Partnership – Retirement & Income Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --navy: #050915;
  --navy-dk: #02040a;
  --navy-soft: #0b1526;
  --teal: #1A6B6B;
  --teal-lt: #7ECECE;
  --gold: #C9A84C;
  --gold-lt: #E3C878;
  --white: #FFFFFF;
  --danger: #E74C3C;
  --success: #5BE088;
  --font-sans: 'DM Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-serif: 'Cormorant Garamond', 'Times New Roman', serif;
}

/* Base */
*,
*::before,
*::after { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: radial-gradient(circle at top, #101a30 0%, #02040a 55%, #000000 100%);
  color: var(--white);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
}

body {
  min-height: 100vh;
}

.page {
  max-width: 1120px;
  margin: 0 auto;
  padding: 1.5rem 1.25rem 2.5rem;
}

/* iOS ghosting fix */
input, textarea {
  background-color: transparent;
  -webkit-text-fill-color: var(--white);
}
.ret-monthly-input::placeholder {
  color: transparent !important;
}

/* In-app browser warning */
.inapp-warning {
  position: fixed;
  inset: 0;
  background: #02040a;
  color: #ffffff;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  z-index: 9999;
  text-align: center;
}

.inapp-warning-inner {
  max-width: 480px;
}

.inapp-warning-title {
  font-family: var(--font-serif);
  font-size: 1.4rem;
  margin-bottom: 0.75rem;
}

.inapp-warning-text {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.7);
  line-height: 1.6;
}

/* Header */
header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1.5rem;
  padding: 1.5rem 0 0.5rem;
}

.brand {
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
}

.brand-mark {
  font-family: var(--font-serif);
  font-size: 1.35rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-lt);
}

.brand-name {
  font-size: 0.8rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
}

.brand-tag {
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
}

.fsp-badge {
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 0.35rem 0.7rem;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.7);
}

/* Hero */
.hero {
  display: grid;
  grid-template-columns: minmax(0, 2.2fr) minmax(0, 1.8fr);
  gap: 1.75rem;
  padding: 1.75rem 0 0.75rem;
  align-items: center;
}

.hero-headline {
  font-family: var(--font-serif);
  font-size: clamp(2rem, 3.4vw, 2.8rem);
  font-weight: 300;
  line-height: 1.1;
  margin: 0 0 0.75rem;
}

.hero-headline em {
  font-style: italic;
  color: var(--gold-lt);
}

.gold-rule {
  width: 72px;
  height: 2px;
  background: linear-gradient(90deg, var(--gold), transparent);
}

.hero-sub {
  font-size: 0.86rem;
  color: rgba(255,255,255,0.6);
  line-height: 1.6;
}

/* Main layout */
.main {
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.1fr);
  gap: 1.5rem;
  padding: 1.5rem 0 0.5rem;
}

/* Cards */
.card {
  background: radial-gradient(circle at top left, rgba(255,255,255,0.06) 0%, rgba(5,9,21,0.98) 55%);
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 18px 45px rgba(0,0,0,0.55);
  overflow: hidden;
}

.card-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.85rem 1.1rem;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  background: linear-gradient(90deg, rgba(255,255,255,0.04), transparent);
}

.card-header-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--gold);
}

.card-title {
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.7);
}

.card-body {
  padding: 1rem 1.1rem 1.1rem;
}
<div id="inapp-warning" class="inapp-warning">

      For best performance and accurate rendering, please open this calculator in your device’s browser
