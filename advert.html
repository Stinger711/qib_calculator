</div>

<script>
// UTM passthrough
(function() {
  const params = new URLSearchParams(window.location.search);
  if ([...params].length > 0) {
    const links = document.querySelectorAll("a");
    links.forEach(a => {
      const url = new URL(a.href, window.location.origin);
      params.forEach((v, k) => url.searchParams.set(k, v));
      a.href = url.toString();
    });
  }
})();

// CTA tracking
document.getElementById("advertCTA").addEventListener("click", () => {
  gtag('event', 'advert_cta_click');
  lintrk('track', { conversion_id: 10 });
});
</script>
