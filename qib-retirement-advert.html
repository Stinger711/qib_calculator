<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QIB Retirement Advert</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  padding: 0;
  background: #050915;
  font-family: 'DM Sans', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
}

.ad-container {
  width: 1080px;
  max-width: 100%;
  height: 1350px;
  background: linear-gradient(180deg, #0b1526 0%, #02040a 100%);
  padding: 60px 70px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* Headline */
.headline {
  font-family: 'Cormorant Garamond', serif;
  font-size: 3.2rem;
  line-height: 1.2;
  color: #E3C878;
  max-width: 85%;
}

/* Subtext */
.subtext {
  font-size: 1.3rem;
  color: rgba(255,255,255,0.75);
  margin-top: 20px;
  max-width: 80%;
}

/* Benefits row */
.benefits {
  margin-top: 40px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.benefit {
  font-size: 1.2rem;
  color: rgba(255,255,255,0.8);
}

/* CTA button */
.cta-button {
  margin-top: 60px;
  display: inline-block;
  padding: 22px 40px;
  background: #C9A84C;
  color: #050915;
  font-size: 1.4rem;
  font-weight: 700;
  text-decoration: none;
  border-radius: 8px;
  text-align: center;
  width: fit-content;
  letter-spacing: 0.03em;
  box-shadow: 0 8px 25px rgba(201,168,76,0.35);
}

/* Footer branding */
.footer {
  text-align: left;
  margin-top: auto;
}

.brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.4rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #E3C878;
}

.tagline {
  font-size: 1rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-top: 6px;
}
</style>
</head>

<body>
<div class="ad-container">

  <!-- HEADLINE -->
  <div>
    <div class="headline">
      You’ve Spent Years Planning<br>
      Everyone Else’s Retirement…
    </div>

    <div class="subtext">
      When do you plan your own?
    </div>

    <div class="benefits">
      <div class="benefit">• Predictable Lifetime Income</div>
      <div class="benefit">• Spouse Continuation Benefit</div>
      <div class="benefit">• Capital‑Equivalent Value</div>
    </div>

    <a class="cta-button" href="https://stinger711.github.io/qib_calculator/lead-gate.html">
      Secure My Retirement Now
    </a>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="brand">Quattro</div>
    <div class="tagline">Investment Brokers · IFA Partnership Programme</div>
  </div>

</div>
</body>
</html>
